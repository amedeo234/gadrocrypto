server {
    # GADROCRYPTO listens on port 8080 so it doesn't conflict
    # with whatever else is already serving on port 80.
    listen 8080;
    listen [::]:8080;

    server_name _;

    root /var/www/gadrocrypto;
    index gadrocrypto.html index.html;

    # ----- Static site -----

    location = / {
        try_files /gadrocrypto.html =404;
    }

    location / {
        try_files $uri $uri/ /gadrocrypto.html;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~ /\.git { deny all; }

    # ----- CoinGecko caching proxy -----
    # Browsers hit /api/coingecko/<path> on this server,
    # nginx fetches https://api.coingecko.com/api/v3/<path> once a minute,
    # and serves the cached response to everyone else.

    location /api/coingecko/ {
        # Strip the prefix and rewrite to CoinGecko's /api/v3 path.
        rewrite ^/api/coingecko/(.*)$ /api/v3/$1 break;

        proxy_pass https://api.coingecko.com;
        proxy_set_header Host api.coingecko.com;
        proxy_set_header User-Agent "GADROCRYPTO/1.0";
        proxy_set_header Cookie "";
        proxy_ssl_server_name on;

        # Cache successful responses for 60 seconds.
        # Cache transient errors briefly to avoid hammering on hiccups.
        proxy_cache coingecko_cache;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 429 502 503 504 30s;
        proxy_cache_use_stale error timeout updating http_429 http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_key "$scheme$request_method$host$request_uri";

        # Helpful debug header — shows HIT / MISS / STALE in browser dev tools.
        add_header X-Cache-Status $upstream_cache_status always;

        # CORS — allow the browser to read the response from any origin.
        add_header Access-Control-Allow-Origin "*" always;

        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
