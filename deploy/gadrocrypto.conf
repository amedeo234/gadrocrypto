server {
    # GADROCRYPTO listens on port 8080 so it doesn't conflict
    # with whatever else is already serving on port 80.
    listen 8080;
    listen [::]:8080;

    server_name _;

    root /var/www/gadrocrypto;
    index gadrocrypto.html index.html;

    # Default to the dashboard at "/"
    location = / {
        try_files /gadrocrypto.html =404;
    }

    location / {
        try_files $uri $uri/ /gadrocrypto.html;
    }

    # Cache the HTML lightly so reloads pick up updates fast
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Long cache for static assets if you add any later
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Hide the .git directory if it's inside the web root
    location ~ /\.git { deny all; }
}
