# Caching proxy for the CoinGecko public API.
# Lives in /etc/nginx/conf.d/ (http context, runs once at nginx startup).
# Server-block usage of the cache zone is in sites-available/gadrocrypto.

proxy_cache_path /var/cache/nginx/coingecko
                 levels=1:2
                 keys_zone=coingecko_cache:10m
                 max_size=100m
                 inactive=10m
                 use_temp_path=off;
