<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GADROCRYPTO — Live Crypto Market</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  :root {
    --bg: #0b0e11;
    --panel: #14181d;
    --border: #1f2530;
    --text: #ffffff;
    --muted: #b8c0c8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: #000;
    border-bottom: 1px solid var(--border);
    height: 50px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 800;
    letter-spacing: 0.5px;
    font-size: 16px;
  }
  .brand .dot {
    width: 10px; height: 10px; border-radius: 2px;
    background: #3cc861;
    box-shadow: 0 0 8px #3cc861;
  }
  .top-actions {
    display: flex; align-items: center; gap: 14px;
    color: var(--muted);
    font-size: 13px;
  }
  .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: #3cc861;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(60, 200, 97, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(60, 200, 97, 0); }
    100% { box-shadow: 0 0 0 0 rgba(60, 200, 97, 0); }
  }
  select.period {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  /* Treemap container */
  #treemap {
    position: relative;
    width: 100vw;
    height: calc(100vh - 50px);
  }
  .tile {
    position: absolute;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff;
    cursor: pointer;
    border: 1px solid rgba(0,0,0,0.35);
    transition: filter 0.15s ease, transform 0.15s ease, background-color 0.4s ease;
    padding: 4px;
  }
  .tile:hover { filter: brightness(1.15); z-index: 5; }
  /* Flash on each WebSocket price tick */
  @keyframes flash-up   { 0% { filter: brightness(1.35); } 100% { filter: brightness(1); } }
  @keyframes flash-down { 0% { filter: brightness(0.7);  } 100% { filter: brightness(1); } }
  .tile.flash-up   { animation: flash-up   0.4s ease-out; }
  .tile.flash-down { animation: flash-down 0.4s ease-out; }
  .tile .spark {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .tile .sym {
    position: relative;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    word-break: break-all;
  }
  .tile .px { position: relative; margin-top: 4px; opacity: 0.95; text-shadow: 0 1px 2px rgba(0,0,0,0.35); }
  .tile .ch { position: relative; margin-top: 2px; opacity: 0.9; text-shadow: 0 1px 2px rgba(0,0,0,0.35); }
  /* Watermark */
  .watermark {
    position: fixed;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .watermark span {
    font-size: clamp(40px, 9vw, 130px);
    font-weight: 900;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.07);
    transform: rotate(-22deg);
    text-shadow: 0 2px 30px rgba(0,0,0,0.4);
    user-select: none;
  }
  .watermark-corner {
    position: fixed;
    bottom: 10px;
    right: 14px;
    color: rgba(255,255,255,0.55);
    font-weight: 700;
    letter-spacing: 2px;
    font-size: 12px;
    z-index: 60;
  }
  .status.err { color: #e0556a; }
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="dot"></span>
    GADROCRYPTO
  </div>
  <div class="top-actions">
    <label style="display:flex;align-items:center;gap:6px;">
      Period:
      <select id="period" class="period">
        <option value="price_change_percentage_1h_in_currency">1h</option>
        <option value="price_change_percentage_24h_in_currency" selected>24h</option>
        <option value="price_change_percentage_7d_in_currency">7d</option>
        <option value="price_change_percentage_30d_in_currency">30d</option>
      </select>
    </label>
    <span class="pulse"></span>
    <span id="status" class="status">connecting…</span>
    <span id="last-update">—</span>
  </div>
</div>

<div id="treemap">
  <div class="loading" id="loading">Loading market data…</div>
</div>

<div class="watermark"><span>GADROCRYPTO</span></div>

<script>
  // Fetch the top 250 by market cap via our own Nginx caching proxy
  // (avoids CoinGecko rate limits — server fetches once per minute and serves the cached copy).
  // sparkline=true gives us 7d hourly prices for the mini trend chart inside each tile.
  const API = '/api/coingecko/coins/markets'
    + '?vs_currency=usd&order=market_cap_desc&per_page=250&page=1'
    + '&sparkline=true&price_change_percentage=1h%2C24h%2C7d%2C30d';

  // Whitelist: only show these tickers.
  const ALLOWED = new Set([
    'BTC','ETH','XRP','BNB','USDT','USDC','SOL'
  ]);

  let coins = [];
  let periodKey = 'price_change_percentage_24h_in_currency';

  // Live-state tracking for the WebSocket ticker
  const tileBySymbol = {};   // symbol (e.g. "BTC") -> tile DOM node
  const lastPrice    = {};   // symbol -> previous price (for tick direction)
  let wsConnected    = false;
  let ws             = null;

  const fmtUSD = v => {
    if (v == null) return '$—';
    if (v >= 1)   return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 2 });
    if (v >= 0.01) return '$' + v.toFixed(4);
    return '$' + v.toFixed(8).replace(/0+$/, '');
  };
  const fmtPct = v => (v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(2) + '%');

  // Build an SVG sparkline that stretches to fill its container.
  function sparklineSvg(prices) {
    if (!prices || prices.length < 2) return '';
    let min = Infinity, max = -Infinity;
    for (const p of prices) {
      if (p < min) min = p;
      if (p > max) max = p;
    }
    const range = max - min || 1;
    const W = 100, H = 100;
    const yTop = 28, yBottom = 92;     // line operates between these
    const step = W / (prices.length - 1);
    let line = '';
    for (let i = 0; i < prices.length; i++) {
      const x = (i * step).toFixed(1);
      const y = (yBottom - ((prices[i] - min) / range) * (yBottom - yTop)).toFixed(1);
      line += (i === 0 ? 'M' : ' L') + x + ',' + y;
    }
    const area = line + ` L${W},${H} L0,${H} Z`;
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`
         + `<path d="${area}" fill="rgba(255,255,255,0.12)"/>`
         + `<path d="${line}" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" vector-effect="non-scaling-stroke"/>`
         + `</svg>`;
  }

  // Color scale: red for negative change, green for positive, gray for ~0
  function colorFor(pct) {
    if (pct == null) return '#3a3f47';
    const clamped = Math.max(-10, Math.min(10, pct));
    const t = Math.abs(clamped) / 10;        // 0..1
    if (clamped >= 0) {
      // green: 27,138,58 (strong) -> 60,200,97 (bright)
      const r = Math.round(40 + (60 - 40) * t);
      const g = Math.round(120 + (200 - 120) * t);
      const b = Math.round(60 + (97 - 60) * t);
      return `rgb(${r},${g},${b})`;
    } else {
      const r = Math.round(140 + (224 - 140) * t);
      const g = Math.round(50 + (85 - 50) * t);
      const b = Math.round(70 + (106 - 70) * t);
      return `rgb(${r},${g},${b})`;
    }
  }

  async function fetchData() {
    const statusEl = document.getElementById('status');
    try {
      const res = await fetch(API, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      coins = await res.json();
      statusEl.textContent = wsConnected ? 'live (ws)' : 'live';
      statusEl.classList.remove('err');
      document.getElementById('last-update').textContent =
        new Date().toLocaleTimeString();
      render();
      // Open the live ticker once we have an initial render to attach to
      if (!wsConnected && !ws) connectWS();
    } catch (e) {
      statusEl.textContent = 'offline — retrying';
      statusEl.classList.add('err');
    }
  }

  // ------- Binance live ticker over WebSocket -------
  // Subscribes to <symbol>USDT@ticker streams. Skips USDT (it's the quote currency).
  function connectWS() {
    const symbols = [...ALLOWED].filter(s => s !== 'USDT');
    if (!symbols.length) return;
    const streams = symbols.map(s => s.toLowerCase() + 'usdt@ticker').join('/');
    const url = 'wss://stream.binance.com:9443/stream?streams=' + streams;

    try { ws = new WebSocket(url); } catch (e) { return; }

    ws.addEventListener('open', () => {
      wsConnected = true;
      const statusEl = document.getElementById('status');
      if (statusEl) {
        statusEl.textContent = 'live (ws)';
        statusEl.classList.remove('err');
      }
    });

    ws.addEventListener('message', (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      const d = msg && msg.data;
      if (!d || d.e !== '24hrTicker' || !d.s) return;

      const sym = d.s.replace(/USDT$/, '');
      const price  = parseFloat(d.c);
      const change = parseFloat(d.P);
      if (!isFinite(price)) return;

      // Mutate the underlying coins record so resize/period-change re-renders use fresh data.
      const coin = coins.find(c => c.symbol && c.symbol.toUpperCase() === sym);
      if (coin) {
        coin.current_price = price;
        coin.price_change_percentage_24h_in_currency = change;
      }

      updateTileLive(sym, price, change);
    });

    ws.addEventListener('close', () => {
      wsConnected = false;
      ws = null;
      const statusEl = document.getElementById('status');
      if (statusEl) statusEl.textContent = 'reconnecting in 30s…';
      setTimeout(connectWS, 30000);
    });

    ws.addEventListener('error', () => { /* close handler will reconnect */ });
  }

  // Patches a single tile in place — no full re-render, no layout shift.
  function updateTileLive(sym, price, change) {
    const tile = tileBySymbol[sym];
    if (!tile) return;

    const pxEl = tile.querySelector('.px');
    const chEl = tile.querySelector('.ch');
    const prev = lastPrice[sym];

    if (pxEl) pxEl.textContent = fmtUSD(price);

    // Only repaint % and color when the user is looking at 24h
    // (Binance ticker is a 24h rolling window; other periods come from CoinGecko).
    if (periodKey === 'price_change_percentage_24h_in_currency') {
      if (chEl) chEl.textContent = fmtPct(change);
      tile.style.background = colorFor(change);
    }
    tile.title = `${sym}\n${fmtUSD(price)}\n${fmtPct(change)}`;

    // Brief brightness flash on price tick — green if up, dim if down
    if (prev != null && price !== prev) {
      const cls = price > prev ? 'flash-up' : 'flash-down';
      tile.classList.remove('flash-up', 'flash-down');
      void tile.offsetWidth; // force animation restart
      tile.classList.add(cls);
    }
    lastPrice[sym] = price;
  }

  function render() {
    const root = document.getElementById('treemap');
    const loading = document.getElementById('loading');
    if (loading) loading.remove();
    root.innerHTML = '';
    // Clear the previous tile->symbol map; we're about to repopulate it.
    Object.keys(tileBySymbol).forEach(k => delete tileBySymbol[k]);

    const W = root.clientWidth;
    const H = root.clientHeight;

    // Use d3 treemap with squarify; filter to whitelist only.
    const data = {
      name: 'root',
      children: coins
        .filter(c => c.market_cap && c.market_cap > 0 && ALLOWED.has(c.symbol.toUpperCase()))
        .map(c => ({
          id: c.id,
          symbol: c.symbol.toUpperCase(),
          price: c.current_price,
          change: c[periodKey],
          value: c.market_cap,
          spark: c.sparkline_in_7d ? c.sparkline_in_7d.price : null,
        })),
    };

    const hierarchy = d3.hierarchy(data)
      .sum(d => d.value)
      .sort((a, b) => b.value - a.value);

    d3.treemap()
      .size([W, H])
      .paddingInner(2)
      .round(true)(hierarchy);

    hierarchy.leaves().forEach(node => {
      const d = node.data;
      const w = node.x1 - node.x0;
      const h = node.y1 - node.y0;
      if (w < 4 || h < 4) return;

      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.left = node.x0 + 'px';
      tile.style.top  = node.y0 + 'px';
      tile.style.width  = w + 'px';
      tile.style.height = h + 'px';
      tile.style.background = colorFor(d.change);

      // Adaptive font sizes based on tile size
      const minSide = Math.min(w, h);
      const symSize = Math.max(10, Math.min(minSide * 0.32, w * 0.22, 140));
      const pxSize  = Math.max(9, Math.min(minSide * 0.14, 22));
      const chSize  = Math.max(9, Math.min(minSide * 0.12, 18));

      // Sparkline goes first so the text overlays it
      let html = (h > 40 && w > 50) ? sparklineSvg(d.spark) : '';
      html += `<div class="sym" style="font-size:${symSize}px">${d.symbol}</div>`;
      // Only show price/change if there is room
      if (h > 50 && w > 60) {
        html += `<div class="px" style="font-size:${pxSize}px">${fmtUSD(d.price)}</div>`;
      }
      if (h > 80 && w > 70) {
        html += `<div class="ch" style="font-size:${chSize}px">${fmtPct(d.change)}</div>`;
      }
      tile.innerHTML = html;
      tile.title = `${d.symbol}\n${fmtUSD(d.price)}\n${fmtPct(d.change)}`;
      root.appendChild(tile);
      tileBySymbol[d.symbol] = tile;
    });
  }

  document.getElementById('period').addEventListener('change', e => {
    periodKey = e.target.value;
    render();
  });

  window.addEventListener('resize', () => { if (coins.length) render(); });

  fetchData();
  setInterval(fetchData, 60 * 1000); // refresh every minute (CoinGecko free-tier safe)
</script>
</body>
</html>
